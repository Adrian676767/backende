<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Študenti</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">
        <h1>Zoznam študentov</h1>

        <div class="controls">
            <label>Zoradiť podľa:</label>

            <select id="sortSelect">
                <option value="age">Vek</option>
                <option value="name">Meno</option>
                <option value="vyska">Výška</option>
            </select>

            <button onclick="loadStudents()">Načítať</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Meno</th>
                    <th>Vek</th>
                    <th>Výška</th>
                </tr>
            </thead>

            <tbody id="studentsTable">
            </tbody>
        </table>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
