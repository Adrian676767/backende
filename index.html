<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoznam študentov</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .controls {
            text-align: center;
            margin-bottom: 20px;
        }

        select {
            padding: 8px;
            font-size: 16px;
        }

        button {
            padding: 8px 15px;
            font-size: 16px;
            cursor: pointer;
            margin-left: 10px;
            background-color: #007bff;
            border: none;
            color: white;
            border-radius: 5px;
        }

        button:hover {
            background-color: #0056b3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ccc;
            text-align: center;
        }

        th {
            background-color: #007bff;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <h1>Zoznam študentov</h1>

    <div class="controls">
        <label for="sort">Triediť podľa:</label>

        <select id="sort">
            <option value="age">Vek</option>
            <option value="name">Meno</option>
            <option value="vyska">Výška</option>
        </select>

        <button onclick="loadStudents()">
            Načítať
        </button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Meno</th>
                <th>Vek</th>
                <th>Výška</th>
            </tr>
        </thead>

        <tbody id="studentsTable">
        </tbody>
    </table>

    <script>
        async function loadStudents() {

            const sort = document.getElementById("sort").value;

            const response = await fetch(
                `http://127.0.0.1:5000/students?sort=${sort}`
            );

            const data = await response.json();

            const table = document.getElementById("studentsTable");

            table.innerHTML = "";

            data.forEach(student => {

                table.innerHTML += `
                    <tr>
                        <td>${student.id}</td>
                        <td>${student.name}</td>
                        <td>${student.age}</td>
                        <td>${student.vyska} cm</td>
                    </tr>
                `;
            });
        }

        loadStudents();
    </script>

</body>
</html>
